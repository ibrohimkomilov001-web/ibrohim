version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: topla-postgres-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: topla_db
      POSTGRES_USER: topla_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-topla_dev_pass}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U topla_user -d topla_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: topla-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-topla_redis_dev}

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: topla-meilisearch-dev
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: topla_meili_master_key
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: true
    volumes:
      - meilisearch_dev_data:/meili_data

volumes:
  postgres_dev_data:
  redis_dev_data:
  meilisearch_dev_data:
