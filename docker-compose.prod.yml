# =============================================
# TOPLA.UZ — Production Docker Compose
# Deploy: Yandex Cloud Compute Instance
# =============================================
version: '3.8'

services:
  # ============================================
  # TOPLA Backend API (Fastify + Prisma)
  # ============================================
  api:
    build: ./topla-backend
    container_name: topla-api
    restart: unless-stopped
    expose:
      - "3001"
    volumes:
      - api_uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-topla_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-topla_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - S3_ENDPOINT=${S3_ENDPOINT:-https://storage.yandexcloud.net}
      - S3_REGION=${S3_REGION:-ru-central1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_PRODUCTS=${S3_BUCKET_PRODUCTS:-topla-products}
      - S3_BUCKET_SHOPS=${S3_BUCKET_SHOPS:-topla-shops}
      - S3_BUCKET_AVATARS=${S3_BUCKET_AVATARS:-topla-avatars}
      - FCM_SERVER_KEY=${FCM_SERVER_KEY}
      - ESKIZ_EMAIL=${ESKIZ_EMAIL}
      - ESKIZ_PASSWORD=${ESKIZ_PASSWORD}
      - ALIANCE_API_LOGIN=${ALIANCE_API_LOGIN}
      - ALIANCE_API_SECRET=${ALIANCE_API_SECRET}
      - ALIANCE_WEBHOOK_SECRET=${ALIANCE_WEBHOOK_SECRET}
      - OCTOBANK_API_LOGIN=${OCTOBANK_API_LOGIN}
      - OCTOBANK_API_SECRET=${OCTOBANK_API_SECRET}
      - OCTOBANK_WEBHOOK_SECRET=${OCTOBANK_WEBHOOK_SECRET}
      - PAYMENT_WEBHOOK_IPS=${PAYMENT_WEBHOOK_IPS}
      - CORS_ORIGINS=https://topla.uz,https://manage.topla.uz,https://vendor.topla.uz,https://pickup.topla.uz
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_API_KEY=${MEILISEARCH_API_KEY}
      - CLIP_SERVICE_URL=http://clip:8100
      - COOKIE_SECRET=${COOKIE_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=production
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    networks:
      - topla-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
        reservations:
          memory: 256M

  # ============================================
  # TOPLA Web Frontend (Next.js)
  # ============================================
  web:
    build:
      context: ./topla-web
      args:
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    container_name: topla-web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.topla.uz/api/v1
      - NEXT_PUBLIC_WS_URL=wss://api.topla.uz
      - NEXT_PUBLIC_STORAGE_URL=https://storage.yandexcloud.net/topla-products
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    depends_on:
      - api
    networks:
      - topla-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M

  # ============================================
  # PostgreSQL 16 (with pgvector for visual search)
  # ============================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: topla-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-topla_db}
      POSTGRES_USER: ${POSTGRES_USER:-topla_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-topla_user} -d ${POSTGRES_DB:-topla_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - topla-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
        reservations:
          memory: 256M

  # ============================================
  # Redis 7 (cache + rate limiting)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: topla-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - topla-network
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'

  # ============================================
  # Meilisearch v1.7 (full-text search)
  # ============================================
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: topla-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:?MEILISEARCH_API_KEY is required}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: true
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - topla-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ============================================
  # Nginx (reverse proxy + SSL + Let's Encrypt)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: topla-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro
    depends_on:
      - api
      - web
    networks:
      - topla-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  # ============================================
  # Certbot (auto SSL renewal)
  # ============================================
  certbot:
    image: certbot/certbot:latest
    container_name: topla-certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - topla-network

  # ============================================
  # PostgreSQL Backup (daily)
  # ============================================
  backup:
    image: postgres:16-alpine
    container_name: topla-backup
    restart: unless-stopped
    volumes:
      - ./backups:/backups
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-topla_user}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-topla_db}
    entrypoint: >
      /bin/sh -c 'while true; do
        FILENAME="/backups/topla_$$(date +%Y%m%d_%H%M%S).sql.gz";
        pg_dump | gzip > $$FILENAME;
        echo "[BACKUP] $$FILENAME created";
        find /backups -name "*.sql.gz" -mtime +7 -delete;
        echo "[BACKUP] Old backups cleaned";
        sleep 86400;
      done'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - topla-network

  # ============================================
  # CLIP Image Embedding Service (visual search)
  # ============================================
  clip:
    build: ./topla-backend/clip-service
    container_name: topla-clip
    restart: unless-stopped
    expose:
      - "8100"
    networks:
      - topla-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: '2.0'
        reservations:
          memory: 512M

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  certbot_www:
  api_uploads:

networks:
  topla-network:
    driver: bridge
