worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server_tokens off;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Upstream services
    upstream web_app {
        server web:3000;
    }

    upstream api_app {
        server api:3001;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name topla.uz www.topla.uz vendor.topla.uz manage.topla.uz api.topla.uz pickup.topla.uz;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # admin.topla.uz — silently drop (connection reset, no response)
    server {
        listen 80;
        listen 443 ssl;
        server_name admin.topla.uz;
        ssl_certificate /etc/letsencrypt/live/topla.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/topla.uz/privkey.pem;
        return 444;
    }

    # Vendor subdomain
    server {
        listen 443 ssl http2;
        server_name vendor.topla.uz;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/topla.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/topla.uz/privkey.pem;

        # SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Clean vendor domain URLs
        location = / {
            return 302 /vendor/register;
        }

        location = /login {
            return 302 /vendor/login;
        }

        location = /register {
            return 302 /vendor/register;
        }

        # Web frontend
        location / {
            proxy_pass http://web_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ==========================================
    # manage.topla.uz — Admin panel (maxfiy)
    # Basic Auth + /admin route larga yonaltirish
    # .htpasswd: docker exec topla-nginx sh -c "htpasswd -c /etc/nginx/htpasswd/admin SIZNING_USERNAME"
    # ==========================================
    server {
        listen 443 ssl http2;
        server_name manage.topla.uz;

        ssl_certificate /etc/letsencrypt/live/topla.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/topla.uz/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store, no-cache" always;

        # HTTP Basic Auth — birinchi himoya qatlami
        auth_basic "Restricted Area";
        auth_basic_user_file /etc/nginx/htpasswd/admin;

        # Root → /admin/login ga yo'naltir
        location = / {
            return 302 /admin/login;
        }

        # Barcha so'rovlar /admin/* orqali web app'ga
        location / {
            proxy_pass http://web_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name topla.uz www.topla.uz;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/topla.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/topla.uz/privkey.pem;

        # SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Health check
        location /health {
            proxy_pass http://api_app;
        }

        # API routes
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://api_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 50M;
        }

        # Auth routes — stricter rate limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass http://api_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket
        location /socket.io/ {
            proxy_pass http://api_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # Uploads
        location /uploads/ {
            proxy_pass http://api_app;
            proxy_set_header Host $host;
        }

        # Web frontend (default)
        location / {
            proxy_pass http://web_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ==========================================
    # api.topla.uz — Dedicated API subdomain
    # ==========================================
    server {
        listen 443 ssl http2;
        server_name api.topla.uz;

        ssl_certificate /etc/letsencrypt/live/topla.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/topla.uz/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # CORS — faqat ruxsat berilgan domenlar
        set $cors_origin "";
        if ($http_origin ~* "^https://(topla\.uz|www\.topla\.uz|vendor\.topla\.uz|manage\.topla\.uz|pickup\.topla\.uz)$") {
            set $cors_origin $http_origin;
        }

        # Health check
        location /health {
            proxy_pass http://api_app;
            proxy_set_header Host $host;
        }

        # Auth routes — stricter rate limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;

            # CORS headerlar
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-CSRF-Token" always;

            if ($request_method = OPTIONS) {
                return 204;
            }

            proxy_pass http://api_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Backend CORS headerlari bilan dublikat bo'lmasligi uchun
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
        }

        # API routes
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-CSRF-Token" always;

            if ($request_method = OPTIONS) {
                return 204;
            }

            proxy_pass http://api_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;

            client_max_body_size 50M;
        }

        # WebSocket
        location /socket.io/ {
            proxy_pass http://api_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # Uploads
        location /uploads/ {
            proxy_pass http://api_app;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # ==========================================
    # pickup.topla.uz — Pickup point dashboard
    # ==========================================
    server {
        listen 443 ssl http2;
        server_name pickup.topla.uz;

        ssl_certificate /etc/letsencrypt/live/topla.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/topla.uz/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Root → /pickup/login
        location = / {
            return 302 /pickup/login;
        }

        location = /login {
            return 302 /pickup/login;
        }

        # Web frontend
        location / {
            proxy_pass http://web_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
