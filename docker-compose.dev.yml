version: '3.8'

services:
  web:
    image: node:20-alpine
    container_name: topla-web-dev
    working_dir: /app
    volumes:
      - ./topla-web:/app
      - topla_web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://host.docker.internal:3001/api/v1
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped

volumes:
  topla_web_node_modules:
