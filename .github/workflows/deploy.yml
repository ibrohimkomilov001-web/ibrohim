# =============================================
# TOPLA.UZ — Deploy to Yandex Cloud
# Triggered manually or on push to main
# =============================================
name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'topla-backend/**'
      - 'topla-web/**'
      - 'nginx/**'
      - 'docker-compose.prod.yml'

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
          S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}
          S3_REGION=${{ secrets.S3_REGION }}
          S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
          ESKIZ_EMAIL=${{ secrets.ESKIZ_EMAIL }}
          ESKIZ_PASSWORD=${{ secrets.ESKIZ_PASSWORD }}
          ALIANCE_API_LOGIN=${{ secrets.ALIANCE_API_LOGIN }}
          ALIANCE_API_SECRET=${{ secrets.ALIANCE_API_SECRET }}
          ALIANCE_WEBHOOK_SECRET=${{ secrets.ALIANCE_WEBHOOK_SECRET }}
          OCTOBANK_API_LOGIN=${{ secrets.OCTOBANK_API_LOGIN }}
          OCTOBANK_API_SECRET=${{ secrets.OCTOBANK_API_SECRET }}
          OCTOBANK_WEBHOOK_SECRET=${{ secrets.OCTOBANK_WEBHOOK_SECRET }}
          PAYMENT_WEBHOOK_IPS=${{ secrets.PAYMENT_WEBHOOK_IPS }}
          MEILISEARCH_API_KEY=${{ secrets.MEILISEARCH_API_KEY }}
          FCM_SERVER_KEY=${{ secrets.FCM_SERVER_KEY }}
          EOF

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "topla-backend,topla-web,nginx,docker-compose.prod.yml,.env"
          target: /opt/topla

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/topla
            # Docker layer caching bilan build (tezroq)
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker compose -f docker-compose.prod.yml ps
            # Health check — kutish va qayta urinish
            echo "Waiting for services to start..."
            for i in 1 2 3 4 5; do
              sleep 5
              if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
                echo "✅ Health check passed!"
                break
              fi
              echo "⏳ Attempt $i/5 — waiting..."
            done
            curl -sf http://localhost:3001/health || echo "⚠️ WARNING: Health check failed after 25s"
            # Eski imagelarni tozalash
            docker image prune -f
