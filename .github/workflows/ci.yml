# =============================================
# TOPLA.UZ — CI Pipeline
# Runs on every push/PR to main
# =============================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Backend: Lint + Type Check + Build
  # ============================================
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: topla-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: topla-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ============================================
  # Web Frontend: Lint + Type Check + Build
  # ============================================
  web:
    name: Web Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: topla-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: topla-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx next lint

      - name: Build
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: https://api.topla.uz/api/v1
          NEXT_PUBLIC_SITE_URL: https://topla.uz

  # ============================================
  # Flutter App: Analyze
  # ============================================
  flutter:
    name: Flutter App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: topla_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.3'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

  # ============================================
  # Docker Build Test (no push)
  # ============================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, web]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t topla-api:test ./topla-backend

      - name: Build web image
        run: docker build -t topla-web:test ./topla-web
        env:
          NEXT_PUBLIC_API_URL: https://api.topla.uz/api/v1
