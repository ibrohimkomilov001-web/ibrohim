<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF8800"/>
      <stop offset="100%" stop-color="#E85500"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Shopping bag body -->
  <rect x="282" y="380" width="460" height="410" rx="48" fill="white"/>

  <!-- Bag handle (semicircular arc) -->
  <path d="M 392,380 A 120,135 0 0 0 632,380"
        fill="none" stroke="white" stroke-width="42" stroke-linecap="round"/>

  <!-- T letter inside bag (orange cutout) -->
  <rect x="372" y="460" width="280" height="72" rx="14" fill="#FF6E00"/>
  <rect x="474" y="460" width="76" height="245" rx="14" fill="#FF6E00"/>
</svg>