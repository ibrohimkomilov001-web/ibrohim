<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <mask id="bagMask">
      <rect width="1024" height="1024" fill="black"/>
      <!-- Bag body (white = visible) -->
      <rect x="282" y="380" width="460" height="410" rx="48" fill="white"/>
      <!-- Handle (white = visible) -->
      <path d="M 392,380 A 120,135 0 0 0 632,380"
            fill="none" stroke="white" stroke-width="42" stroke-linecap="round"/>
      <!-- T cutout (black = transparent) -->
      <rect x="372" y="460" width="280" height="72" rx="14" fill="black"/>
      <rect x="474" y="460" width="76" height="245" rx="14" fill="black"/>
    </mask>
  </defs>

  <!-- White shape masked to bag-minus-T -->
  <rect width="1024" height="1024" fill="white" mask="url(#bagMask)"/>
</svg>