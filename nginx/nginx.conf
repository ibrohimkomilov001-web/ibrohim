worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    # Hide nginx version
    server_tokens off;

    # Buffer limits — prevent large header/body attacks
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_max_body_size 50M;

    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 65;
    send_timeout 10;

    # SSL session cache (shared across workers)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Modern SSL ciphers
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Security headers
    map $sent_http_content_type $csp {
        default "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://storage.yandexcloud.net; font-src 'self' data:; connect-src 'self' https://api.topla.uz wss://api.topla.uz;";
    }

    # Upstream services
    upstream web_app {
        server web:3000;
    }

    upstream api_app {
        server api:3001;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name topla.uz www.topla.uz manage.topla.uz vendor.topla.uz pickup.topla.uz api.topla.uz;

        # Container healthcheck (no redirect, no TLS)
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # admin.topla.uz — silently drop (yashirin)
    server {
        listen 80;
        listen 443 ssl;
        server_name admin.topla.uz;
        ssl_certificate /etc/letsencrypt/live/topla.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/topla.uz/privkey.pem;
        return 444;
    }

    # ==========================================
    # topla.uz + www.topla.uz (Customer storefront)
    # ==========================================
    server {
        listen 443 ssl;
        http2 on;
        server_name topla.uz www.topla.uz;

        ssl_certificate /etc/letsencrypt/live/topla.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/topla.uz/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # API routes - proxy to backend
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://api_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Auth routes — stricter rate limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass http://api_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket
        location /socket.io/ {
            proxy_pass http://api_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # Uploads
        location /uploads/ {
            proxy_pass http://api_app;
            proxy_set_header Host $host;
        }

        # Health check
        location /health {
            proxy_pass http://api_app;
        }

        # Web app - catch all (must be last)
        location / {
            proxy_pass http://web_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ==========================================
    # manage.topla.uz (Admin panel — maxfiy)
    # Basic Auth + /admin route larga proxy
    # htpasswd faylini yaratish:
    #   docker exec topla-nginx sh -c "mkdir -p /etc/nginx/htpasswd && htpasswd -c /etc/nginx/htpasswd/admin SIZNING_USERNAME"
    # ==========================================
    server {
        listen 443 ssl;
        http2 on;
        server_name manage.topla.uz;

        ssl_certificate /etc/letsencrypt/live/topla.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/topla.uz/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store, no-cache" always;
        add_header Strict-Transport-Security "max-age=31536000" always;

        # HTTP Basic Auth — birinchi himoya qatlami
        auth_basic "Restricted Area";
        auth_basic_user_file /etc/nginx/htpasswd/admin;

        # Root → admin login
        location = / {
            return 302 /admin/login;
        }

        # API routes — admin login va boshqa API so'rovlar
        location /api/ {
            proxy_pass http://api_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50M;

            # API uchun basic auth kerak emas
            auth_basic off;
        }

        # Uploads
        location /uploads/ {
            proxy_pass http://api_app;
            proxy_set_header Host $host;
            auth_basic off;
        }

        # WebSocket (Socket.IO)
        location /socket.io/ {
            proxy_pass http://api_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
            auth_basic off;
        }

        location / {
            proxy_pass http://web_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ==========================================
    # vendor.topla.uz (Vendor panel)
    # ==========================================
    server {
        listen 443 ssl;
        http2 on;
        server_name vendor.topla.uz;

        ssl_certificate /etc/letsencrypt/live/topla.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/topla.uz/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        # Prevent browser caching of HTML pages (force fresh content)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        # API routes
        location /api/ {
            proxy_pass http://api_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50M;
        }

        # Uploads
        location /uploads/ {
            proxy_pass http://api_app;
            proxy_set_header Host $host;
        }

        # WebSocket (Socket.IO)
        location /socket.io/ {
            proxy_pass http://api_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        location / {
            proxy_pass http://web_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header Cache-Control;
            proxy_hide_header Expires;
        }
    }

    # ==========================================
    # pickup.topla.uz (Pickup Point Staff Panel)
    # ==========================================
    server {
        listen 443 ssl;
        http2 on;
        server_name pickup.topla.uz;

        ssl_certificate /etc/letsencrypt/live/topla.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/topla.uz/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        location /api/ {
            proxy_pass http://api_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://web_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ==========================================
    # api.topla.uz (Backend API + WebSocket)
    # ==========================================
    server {
        listen 443 ssl;
        http2 on;
        server_name api.topla.uz;

        ssl_certificate /etc/letsencrypt/live/topla.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/topla.uz/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 50M;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # CORS — faqat ruxsat berilgan domenlar
        set $cors_origin '';
        if ($http_origin ~* "^https://(topla\.uz|manage\.topla\.uz|vendor\.topla\.uz|pickup\.topla\.uz)$") {
            set $cors_origin $http_origin;
        }
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Preflight
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # API routes
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            # Strip backend CORS headers to avoid duplicates
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Expose-Headers;

            proxy_pass http://api_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Auth routes — stricter rate limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;

            # Strip backend CORS headers to avoid duplicates
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Expose-Headers;

            proxy_pass http://api_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket
        location /socket.io/ {
            proxy_pass http://api_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # Health check
        location /health {
            proxy_pass http://api_app;
        }

        # Uploads
        location /uploads/ {
            proxy_pass http://api_app;
            proxy_set_header Host $host;
        }
    }
}
